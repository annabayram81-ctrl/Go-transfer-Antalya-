<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Transfer Antalya</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #111827;
        --text: #f8fafc;
        --muted: #cbd5e1;
        --accent: #22c55e;
        --accent-dark: #16a34a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(160deg, #0f172a, #1e293b 60%, #0b1220);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: min(760px, 100%);
        background: rgba(17, 24, 39, 0.95);
        border: 1px solid rgba(148, 163, 184, 0.2);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0,0,0,.35);
      }
      h1 { margin: 0 0 8px; font-size: 2rem; }
      .subtitle { margin: 0 0 20px; color: var(--muted); }
      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field.full { grid-column: 1 / -1; }
      label { font-size: .95rem; color: #e2e8f0; }
      input, textarea {
        width: 100%;
        border: 1px solid #334155;
        background: #0b1220;
        color: var(--text);
        border-radius: 10px;
        padding: 10px 12px;
        font-size: 1rem;
      }
      textarea { min-height: 90px; resize: vertical; }
      .actions {
        margin-top: 18px;
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }
      button, .wa {
        border: none;
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 1rem;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      button {
        background: var(--accent);
        color: #052e16;
        font-weight: 700;
      }
      button:hover { background: #4ade80; }
      .wa {
        background: var(--accent-dark);
        color: #fff;
      }
      .wa:hover { background: #15803d; }
      #priceResult {
        margin-top: 14px;
        color: #bbf7d0;
        font-weight: 700;
      }
      @media (max-width: 640px) {
        .grid { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Go Transfer Antalya</h1>
      <p class="subtitle">VIP трансферы в Анталии</p>

      <form id="transferForm">
        <div class="grid">
          <div class="field">
            <label for="from">Откуда едем?</label>
            <input id="from" name="from" type="text" required />
          </div>

          <div class="field">
            <label for="to">Куда едем?</label>
            <input id="to" name="to" type="text" required />
          </div>

          <div class="field">
            <label for="date">Дата</label>
            <input id="date" name="date" type="date" required />
          </div>

          <div class="field">
            <label for="time">Время</label>
            <input id="time" name="time" type="time" required />
          </div>

          <div class="field">
            <label for="passengers">Количество пассажиров</label>
            <input id="passengers" name="passengers" type="number" min="1" value="1" required />
          </div>

          <div class="field full">
            <label for="comment">Комментарий</label>
            <textarea id="comment" name="comment" placeholder="Дополнительные пожелания..."></textarea>
          </div>
        </div>

        <div class="actions">
          <button type="button" id="showPrice">Показать цену</button>
          <a
            class="wa"
            id="whatsappLink"
            href="https://wa.me/905000000000"
            target="_blank"
            rel="noopener noreferrer"
            >Заказать через WhatsApp</a
          >
        </div>

        <div id="priceResult" aria-live="polite"></div>
      </form>
    </main>

    <script>
      const form = document.getElementById('transferForm');
      const priceResult = document.getElementById('priceResult');
      const whatsappLink = document.getElementById('whatsappLink');

      function buildMessage() {
        const data = new FormData(form);
        const from = data.get('from') || '-';
        const to = data.get('to') || '-';
        const date = data.get('date') || '-';
        const time = data.get('time') || '-';
        const passengers = data.get('passengers') || '-';
        const comment = data.get('comment') || '-';

        return `Здравствуйте! Хочу заказать трансфер.\nОткуда: ${from}\nКуда: ${to}\nДата: ${date}\nВремя: ${time}\nПассажиров: ${passengers}\nКомментарий: ${comment}`;
      }

      document.getElementById('showPrice').addEventListener('click', () => {
        const passengers = Number(document.getElementById('passengers').value || 1);
        const base = 35;
        const extra = Math.max(0, passengers - 3) * 8;
        const total = base + extra;
        priceResult.textContent = `Примерная цена: от €${total}`;
      });

      form.addEventListener('input', () => {
        const msg = encodeURIComponent(buildMessage());
        whatsappLink.href = `https://wa.me/905000000000?text=${msg}`;
      });

      whatsappLink.href = `https://wa.me/905000000000?text=${encodeURIComponent(buildMessage())}`;
    </script>
  </body>
</html>
